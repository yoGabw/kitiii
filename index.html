<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>its our dayyyay</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            background-image:url('https://i.pinimg.com/1200x/5a/14/40/5a1440572dbaaec1550ade7113652715.jpg');
            background-size:cover;
            background-position:center;
            background-repeat:no-repeat;

            display:flex;
            justify-content:center;
            align-items:center;

            min-height:100vh;
            padding:20px;

            font-family:Arial,sans-serif;
            color:white;
        }
        

        .container{
            text-align:center;
            background:rgba(0,0,0,0.75);

            padding:30px;
            border-radius:20px;

            width:100%;
            max-width:600px;

            box-shadow:0 0 25px rgba(0,0,0,0.5);
        }

        .photo{
            width:100%;
            max-width:500px;
            height:auto;

            border-radius:15px;
            margin-bottom:20px;

            transition:0.3s;
        }

        .photo:hover{
            transform:scale(1.03);
        }

        .text{
            font-size:20px;
            line-height:1.7;
            margin-bottom:25px;
        }

        .next-button{
            display:inline-block;

            padding:12px 28px;
            font-size:18px;

            color:#ffffff;
            text-decoration:none;

            border-radius:10px;

            background:linear-gradient(45deg,#722F37,#722F37);

            transition:0.3s;

            box-shadow:0 5px 15px rgba(114,47,55,0.4);
        }

        .next-button:hover{
            transform:scale(1.05);

            background:linear-gradient(45deg,#722F37,#722F37);

            box-shadow:0 10px 20px rgba(114,47,55,0.6);
        }

        @media(max-width:768px){

            .container{
                padding:20px;
            }

            .text{
                font-size:14px;
            }

            .next-button{
                width:100%;
                font-size:16px;
            }

        }

    </style>
</head>

<body>

    <div class="container">

        <img src="https://i.pinimg.com/736x/08/bb/4b/08bb4b0a09c1542cf4903d8cc080cf4e.jpg" alt="Photo" class="photo">

        <div class="text">
            HAIAIIAIII
            <br><br>
        stinki
        </div>

        <a href="next.html" class="next-button">
            Next
        </a>

    </div>

</body>
</html>
